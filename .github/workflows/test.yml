name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Install test dependencies
        run: pip install -r requirements_test.txt
      - name: Run the suite
        run: pytest
